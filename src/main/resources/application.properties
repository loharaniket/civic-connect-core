spring.application.name=app

spring.datasource.url=jdbc:mysql://localhost:3306/civic_connect
spring.datasource.username=root
spring.datasource.password=aniket@12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# enable logging
spring.jpa.show-sql=true

# 2. Format the SQL so it is readable (multi-line) instead of one long string
spring.jpa.properties.hibernate.format_sql=true

# 3. (Highly Recommended) Show the actual parameters/values 
# By default, JPA replaces values with '?', this reveals what the '?' is.
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
